name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Typecheck & Build
    runs-on: ubuntu-latest

    # These are not real secrets. The build never opens a database connection or
    # reads a signing key (every route that touches Prisma/Auth.js is rendered
    # dynamically, not statically generated), so placeholder values are enough
    # to satisfy code paths that merely read process.env at module load time.
    # Real values live in Vercel's project environment variables, not here.
    env:
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/syncspace_ci?schema=public"
      AUTH_SECRET: "ci-placeholder-secret"
      AUTH_URL: "http://localhost:3000"
      NEXTAUTH_URL: "http://localhost:3000"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: Run typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
